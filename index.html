<body>

<div class="header" id="user"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 🔥 jouw config
const firebaseConfig = {
  apiKey: "AIzaSyBAGH-V7wnpHpu6bTIhwU-hFK5KJGDYj5g",
  authDomain: "vt-shot-tracker.firebaseapp.com",
  projectId: "vt-shot-tracker",
  storageBucket: "vt-shot-tracker.firebasestorage.app",
  messagingSenderId: "65574143328",
  appId: "1:65574143328:web:3219987d4ce5a9ed478a05"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// USER
let user = localStorage.getItem("user");
if(!user){
  user = prompt("Naam?");
  localStorage.setItem("user", user);
}
document.getElementById("user").innerText = user;

// LEADERBOARD LIVE
db.collection("scores").onSnapshot(snap=>{
  let arr=[];
  snap.forEach(d=>arr.push(d.data()));
  arr.sort((a,b)=>b.score-a.score);

  document.getElementById("lb").innerHTML =
    "<b>🍻 Live</b><br>" +
    arr.map(x=>`${x.name}: ${x.score}`).join("<br>");
});

// SCORE UPDATE
function addPoint(){
  const ref = db.collection("scores").doc(user);

  ref.get().then(doc=>{
    if(doc.exists){
      ref.update({score: doc.data().score+1});
    } else {
      ref.set({name:user,score:1});
    }
  });
}

// MAP
const map = L.map('map').setView([45.295,6.582],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// USER MARKER
let userMarker=null;

// LIFTS (kort voorbeeld — plak hier jouw volledige lijst!)
const lifts = [
  {[{"id":"lift_1777045737391","name":"VT26 GRAND FOND","type":"gondola","startLat":45.280839259058155,"startLng":6.568225622177124,"endLat":45.26627695547582,"endLng":6.580416262149811},{"id":"lift_1777045772826","name":"VT24 THORENS","type":"gondola","startLat":45.27222879300695,"startLng":6.591826379299165,"endLat":45.26591261403695,"endLng":6.595289111137391},{"id":"lift_1777045856665","name":"VT23 PORTETTE","type":"chair","startLat":45.286625392305766,"startLng":6.5833908319473275,"endLat":45.27190979185499,"endLng":6.591276526451112},{"id":"lift_1777045898643","name":"VT21 MORAINE","type":"gondola","startLat":45.28769159186485,"startLng":6.583313047885896,"endLat":45.272819601055765,"endLng":6.60618156194687},{"id":"lift_1777045962211","name":"VT14 CASCADES","type":"chair","startLat":45.2951204650048,"startLng":6.577489972114564,"endLat":45.291131599989455,"endLng":6.59454882144928},{"id":"lift_1777045998509","name":"VT13 FUNITEL PECLET","type":"gondola","startLat":45.295463864108015,"startLng":6.575864553451539,"endLat":45.29164484716567,"endLng":6.614381074905396},{"id":"lift_1777046087006","name":"VT15 LAC BLANC","type":"chair","startLat":45.29426384499162,"startLng":6.582296490669251,"endLat":45.29661668874574,"endLng":6.60655975341797},{"id":"lift_1777046199777","name":"VT2 PIONNIERS","type":"chair","startLat":45.29527895715698,"startLng":6.582065820693971,"endLat":45.30499518943833,"endLng":6.586842834949494},{"id":"lift_1777046256099","name":"PLEIN SUD","type":"chair","startLat":45.29517706939573,"startLng":6.571975350379944,"endLat":45.30558754275633,"endLng":6.588725745677948},{"id":"lift_1777046279017","name":"3 VALLEES","type":"chair","startLat":45.30507064880374,"startLng":6.5862876176834115,"endLat":45.31228787282188,"endLng":6.586960852146149},{"id":"lift_1777046299299","name":"3 VALLÉES","type":"gondola","startLat":45.305032919133595,"startLng":6.586000621318817,"endLat":45.312353891277624,"endLng":6.581786870956422},{"id":"lift_1777046340749","name":"CAIRN","type":"gondola","startLat":45.29863737718759,"startLng":6.577752828598023,"endLat":45.29427705288738,"endLng":6.564548313617707},{"id":"lift_1777046357659","name":"CARON","type":"gondola","startLat":45.29423554234743,"startLng":6.564550995826722,"endLat":45.263873982699444,"endLng":6.560288965702058},{"id":"lift_1777046396813","name":"2 LACS","type":"chair","startLat":45.2963695220983,"startLng":6.571342349052429,"endLat":45.28199426821821,"endLng":6.573995053768159},{"id":"lift_1777046473145","name":"PLAIN DE L'EAU","type":"chair","startLat":45.30292567719034,"startLng":6.544198393821717,"endLat":45.28652915029749,"endLng":6.5495601296424875},{"id":"lift_1777046505245","name":"BOISMINT","type":"chair","startLat":45.29506574737321,"startLng":6.561461091041566,"endLat":45.28130541754579,"endLng":6.551311612129212},{"id":"lift_1777046531929","name":"MOUTIERE","type":"chair","startLat":45.29495065149305,"startLng":6.562356948852539,"endLat":45.282488725736215,"endLng":6.572903394699098},{"id":"lift_1777046656355","name":"ROSAËL","type":"chair","startLat":45.24667093165245,"startLng":6.57021850347519,"endLat":45.2659881254081,"endLng":6.575360298156739},{"id":"lift_1777046681371","name":"PEYRON","type":"chair","startLat":45.24604963632577,"startLng":6.5707576274871835,"endLat":45.251287943902405,"endLng":6.587773561477662},{"id":"lift_1777046704193","name":"BOUCHET","type":"chair","startLat":45.25057983755542,"startLng":6.586984992027284,"endLat":45.255591152349595,"endLng":6.599923968315125},{"id":"lift_1777046736913","name":"TYROLIENNE","type":"chair","startLat":45.255343806945056,"startLng":6.600637435913086,"endLat":45.26579557121317,"endLng":6.594371795654298},{"id":"lift_1777046893023","name":"FACE NORD","type":"chair","startLat":45.27589434620069,"startLng":6.598861813545228,"endLat":45.266142923404914,"endLng":6.595836281776428},{"id":"lift_1777046930169","name":"OR2 ORELLE-CARON","type":"chair","startLat":45.24621959620886,"startLng":6.569598913192749,"endLat":45.26310351966133,"endLng":6.559835672378541},{"id":"lift_1777047054461","name":"LA BEE","type":"drag","startLat":45.29701479459216,"startLng":6.582790017127992,"endLat":45.282345295754865,"endLng":6.573686599731446}]}
];

// DRAW
lifts.forEach(l=>{
  L.polyline([[l.startLat,l.startLng],[l.endLat,l.endLng]],{color:"#388bfd"}).addTo(map);
});

// DIST
function dist(a,b,c,d){
  const R=6371000;
  const dLat=(c-a)*Math.PI/180;
  const dLng=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// LINE DIST
function distLine(lat,lng,l){
  const A={x:l.startLat,y:l.startLng};
  const B={x:l.endLat,y:l.endLng};
  const P={x:lat,y:lng};

  const ABx=B.x-A.x;
  const ABy=B.y-A.y;
  const APx=P.x-A.x;
  const APy=P.y-A.y;

  const t=Math.max(0,Math.min(1,(APx*ABx+APy*ABy)/(ABx*ABx+ABy*ABy)));

  const x=A.x+ABx*t;
  const y=A.y+ABy*t;

  return dist(lat,lng,x,y);
}

// STATE
let activeLift=null;
let triggered=false;

// SHOT
function shot(){
  const el=document.createElement("div");
  el.className="shot";
  el.innerHTML="🚨 SHOTJE! 🚨";
  document.body.appendChild(el);

  navigator.vibrate?.([200,100,200]);
  new Audio("https://www.soundjay.com/misc/sounds/air-horn-1.mp3").play();

  addPoint();

  setTimeout(()=>el.remove(),2000);
}

// GPS
navigator.geolocation.watchPosition(pos=>{
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;

  if(!userMarker){
    userMarker=L.circleMarker([lat,lng],{radius:8,color:"#fff",fillColor:"#388bfd",fillOpacity:1}).addTo(map);
  } else userMarker.setLatLng([lat,lng]);

  lifts.forEach(l=>{
    const dStart=dist(lat,lng,l.startLat,l.startLng);
    const dLine=distLine(lat,lng,l);

    if(!activeLift && dStart<60){
      activeLift=l;
      triggered=false;
    }

    if(activeLift && l.id===activeLift.id){
      if(dLine<50){
        const midLat=(l.startLat+l.endLat)/2;
        const midLng=(l.startLng+l.endLng)/2;
        const dMid=dist(lat,lng,midLat,midLng);

        if(!triggered && dMid<80){
          triggered=true;
          if(Math.random()<0.2){
            shot();
          }
        }
      } else {
        activeLift=null;
      }
    }
  });

},{enableHighAccuracy:true});

</script>
</body>
</html>
