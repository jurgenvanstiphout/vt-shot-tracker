<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VT Shot Tracker V14</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body, html { margin: 0; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        /* Kaart in Dark Mode voor batterijbesparing (OLED) */
        #map { height: 100%; width: 100%; z-index: 1; filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }
        
        .header { 
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); 
            background: rgba(20, 20, 20, 0.9); padding: 8px 15px; border-radius: 30px; 
            z-index: 1000; border: 1px solid #444; display: flex; align-items: center; gap: 10px;
        }

        .status-badge { font-size: 11px; padding: 4px 10px; border-radius: 15px; background: #333; color: #eee; font-weight: bold; }
        .side-panel { position: absolute; left: 10px; bottom: 20px; z-index: 1000; width: 170px; display: flex; flex-direction: column; gap: 8px; }
        .box { background: rgba(15, 15, 15, 0.9); padding: 10px; border-radius: 12px; border: 1px solid #333; font-size: 12px; color: #fff; }
        
        #historyLog { max-height: 80px; overflow-y: auto; font-size: 10px; color: #aaa; margin-top: 5px; }
        .log-entry { border-bottom: 1px solid #222; padding: 2px 0; }

        .settings-btn { position: absolute; right: 10px; top: 10px; z-index: 1000; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 50%; cursor: pointer; }
        .settings-panel { display: none; position: absolute; top: 65px; right: 10px; z-index: 1001; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #444; width: 250px; color: white; }
        
        .btn { background: #007bff; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; margin-top: 8px; cursor: pointer; font-weight: bold; }
        .shot { position: fixed; inset: 0; background: rgba(255, 0, 0, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; z-index: 9999; text-align: center; color: white; }
    </style>
</head>
<body>

<div class="header">
    <strong id="userNameDisplay">...</strong>
    <div id="statusBadge" class="status-badge">Stand-by</div>
</div>

<button class="settings-btn" onclick="toggleSettings()">⚙️</button>

<div class="settings-panel" id="settingsPanel">
    <strong>Systeeminstellingen</strong>
    <button id="wakeLockBtn" class="btn" onclick="toggleWakeLock()">🚫 Houd Scherm Aan</button>
    <p style="font-size:10px; color:#888;">Zet dit aan en je helderheid laag voor de beste GPS-ontvangst in je zak.</p>
    
    <hr style="border-color:#333">
    <strong>Kans op Shot: <span id="probVal">20</span>%</strong>
    <input type="range" id="probSlider" style="width:100%" min="0" max="100" value="20" oninput="updateProb(this.value)">
    
    <hr style="border-color:#333">
    <button class="btn" style="background:#2ed573" onclick="startSimulatie()">🚀 Test Rit Simulatie</button>
</div>

<div class="side-panel">
    <div class="box" id="leaderboard">Scores laden...</div>
    <div class="box">
        <b>📜 Historie</b>
        <div id="historyLog">Wachten op actie...</div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// 1. FIREBASE INITIALISATIE
const firebaseConfig = { apiKey: "AIzaSyBAGH-V7wnpHpu6bTIhwU-hFK5KJGDYj5g", authDomain: "vt-shot-tracker.firebaseapp.com", projectId: "vt-shot-tracker", storageBucket: "vt-shot-tracker.firebasestorage.app", messagingSenderId: "65574143328", appId: "1:65574143328:web:3219987d4ce5a9ed478a05" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 2. LIFT DATA
const lifts = [
    {"id":"L1","name":"GRAND FOND","startLat":45.2808,"startLng":6.5682,"endLat":45.2662,"endLng":6.5804},
    {"id":"L2","name":"THORENS","startLat":45.2722,"startLng":6.5918,"endLat":45.2659,"endLng":6.5952},
    {"id":"L3","name":"PORTETTE","startLat":45.2866,"startLng":6.5833,"endLat":45.2719,"endLng":6.5912},
    {"id":"L4","name":"MORAINE","startLat":45.2876,"startLng":6.5833,"endLat":45.2728,"endLng":6.6061},
    {"id":"L5","name":"CASCADES","startLat":45.2951,"startLng":6.5774,"endLat":45.2911,"endLng":6.5945},
    {"id":"L12","name":"CARON","startLat":45.2942,"startLng":6.5645,"endLat":45.2638,"endLng":6.5602}
];

// 3. APP STATE
let user = localStorage.getItem("vt_user") || prompt("Naam?") || "Skiër";
localStorage.setItem("vt_user", user);
document.getElementById("userNameDisplay").innerText = user;

let activeLift = null;
let triggered = false;
let wakeLock = null;
let shotProbability = 20;

// 4. KAART SETUP
const map = L.map('map', {zoomControl: false}).setView([45.295, 6.582], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let userMarker = L.circleMarker([0,0], {radius: 7, color: "#fff", fillColor: "#007bff", fillOpacity: 1, weight: 2}).addTo(map);

// 5. WAKE LOCK
async function toggleWakeLock() {
    try {
        if (wakeLock) {
            await wakeLock.release();
            wakeLock = null;
            document.getElementById("wakeLockBtn").innerText = "🚫 Houd Scherm Aan";
            document.getElementById("wakeLockBtn").style.background = "#007bff";
        } else {
            wakeLock = await navigator.wakeLock.request('screen');
            document.getElementById("wakeLockBtn").innerText = "✅ Scherm blijft aan";
            document.getElementById("wakeLockBtn").style.background = "#2ed573";
        }
    } catch (err) { console.error(err); }
}

// 6. TRACKING LOGICA
function getDist(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function checkLogic(lat, lng) {
    userMarker.setLatLng([lat, lng]);
    lifts.forEach(l => {
        const dStart = getDist(lat, lng, l.startLat, l.startLng);
        const dEnd = getDist(lat, lng, l.endLat, l.endLng);

        if (!activeLift && dStart < 80) {
            activeLift = l; triggered = false;
            document.getElementById("statusBadge").innerText = l.name;
            document.getElementById("statusBadge").style.background = "#2ed573";
            addToLog(`🚠 Start: ${l.name}`);
        }

        if (activeLift && l.id === activeLift.id) {
            const dMid = getDist(lat, lng, (l.startLat+l.endLat)/2, (l.startLng+l.endLng)/2);
            if (!triggered && dMid < 160) {
                triggered = true;
                if (Math.random() * 100 < shotProbability) shot(l.name);
                else addToLog(`✅ Safe in ${l.name}`);
            }
            if (dEnd < 80) {
                activeLift = null;
                document.getElementById("statusBadge").innerText = "Stand-by";
                document.getElementById("statusBadge").style.background = "#333";
            }
        }
    });
}

function shot(name) {
    const el = document.createElement("div");
    el.className = "shot";
    el.innerHTML = "🚨 SHOTJE! 🚨<br><span style='font-size:18px'>HUP HOLLAND! 🍻</span>";
    document.body.appendChild(el);
    new Audio("https://www.soundjay.com/misc/sounds/air-horn-1.mp3").play().catch(()=>{});
    addToLog(`🥃 SHOTJE in ${name}!`);
    db.collection("scores").doc(user).get().then(doc => {
        if(doc.exists) db.collection("scores").doc(user).update({score: doc.data().score + 1});
        else db.collection("scores").doc(user).set({name: user, score: 1});
    });
    setTimeout(() => el.remove(), 4000);
}

function addToLog(msg) {
    const log = document.getElementById("historyLog");
    if(log.innerText.includes("Wachten")) log.innerHTML = "";
    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    log.innerHTML = `<div class="log-entry"><b>${time}</b> ${msg}</div>` + log.innerHTML;
}

// UI HANDLERS
function toggleSettings() { const s = document.getElementById("settingsPanel"); s.style.display = s.style.display === "block" ? "none" : "block"; }
function updateProb(v) { shotProbability = v; document.getElementById("probVal").innerText = v; }

lifts.forEach(l => {
    L.polyline([[l.startLat, l.startLng], [l.endLat, l.endLng]], {color: "#007bff", weight: 3, opacity: 0.6}).addTo(map);
});

db.collection("scores").onSnapshot(snap => {
    let arr = []; snap.forEach(d => arr.push(d.data()));
    arr.sort((a,b) => b.score - a.score);
    document.getElementById("leaderboard").innerHTML = "<b>🏆 Top Drinkers</b><hr style='border-color:#333'>" + arr.map(x => `<div>${x.name}: <b>${x.score}</b></div>`).join("");
});

navigator.geolocation.watchPosition(pos => checkLogic(pos.coords.latitude, pos.coords.longitude), null, {enableHighAccuracy: true});
</script>
</body>
</html>
